[project]
name = "gitpulse"
version = "0.1.0"
description = "CLI tool that generates weekly standup summaries from git history"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["typer", "groq", "gitpython", "rich", "python-dotenv"]

[project.scripts]
gitpulse = "src.cli:app"

[tool.ruff]
select = ["T20"]